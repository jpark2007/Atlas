name: Atlas
options:
  bundleIdPrefix: com.atlas
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Atlas:
    type: application
    platform: macOS
    sources:
      - Atlas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atlas.Atlas
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
  AtlasTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AtlasTests
    dependencies:
      - target: Atlas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Atlas:
    build:
      targets:
        Atlas: all
        AtlasTests: [test]
    test:
      targets:
        - AtlasTests
