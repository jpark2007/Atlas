name: Atlas
options:
  bundleIdPrefix: com.atlas
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Atlas:
    type: application
    platform: macOS
    # Google OAuth client id/secret come from Config/Secrets.xcconfig (gitignored).
    # Missing file → Xcode treats the base config as empty (warning, not error).
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: Atlas
        excludes:
          - "Atlas.entitlements"
      - path: Atlas/Atlas.entitlements
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atlas.Atlas
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Atlas/Atlas.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Custom Info.plist keys (GoogleOAuthClientID/Secret) are NOT emitted by Xcode's
        # INFOPLIST_KEY_* mechanism — that only handles Apple's known keys. So we generate
        # the plist explicitly below; $(...) values still resolve from Secrets.xcconfig.
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Atlas/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: "public.app-category.productivity"
        NSHumanReadableCopyright: ""
        NSCalendarsUsageDescription: "Atlas reads your Apple Calendar events to display them alongside your Atlas schedule. No events are modified."
        NSCalendarsFullAccessUsageDescription: "Atlas reads your Apple Calendar events to show them alongside your schedule. Atlas never modifies your calendars."
        NSMicrophoneUsageDescription: "Atlas uses the microphone for click-to-talk capture, transcribing what you say into the capture bar. Recording only starts when you tap the mic."
        NSSpeechRecognitionUsageDescription: "Atlas transcribes your speech on-device so you can dictate tasks and notes into the capture bar."
        GoogleOAuthClientID: "$(GOOGLE_OAUTH_CLIENT_ID)"
        GoogleOAuthClientSecret: "$(GOOGLE_OAUTH_CLIENT_SECRET)"
  AtlasTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AtlasTests
    dependencies:
      - target: Atlas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Atlas:
    build:
      targets:
        Atlas: all
        AtlasTests: [test]
    test:
      targets:
        - AtlasTests
